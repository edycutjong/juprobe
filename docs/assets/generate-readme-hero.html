<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_asset-utilities.css"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:640px;overflow:hidden;position:relative}
.background{opacity:0.7}
.content{position:relative;z-index:1;display:flex;height:100%;padding:48px 56px}
.left{width:40%;display:flex;flex-direction:column;justify-content:center;gap:16px}
.right{width:60%;display:flex;align-items:center;justify-content:center}
.app-name{font-family:var(--font-display);font-size:80px;font-weight:800;line-height:1}
.one-liner{font-size:24px;color:var(--text-mid);line-height:1.5}
.feat-item{font-family:var(--font-mono);font-size:16px;color:var(--text-mid);padding:4px 0}
.diagram{display:flex;flex-direction:column;gap:20px;align-items:center}
.d-row{display:flex;align-items:center;gap:24px}
.d-node{padding:14px 22px;border-radius:var(--radius-12);font-family:var(--font-mono);font-size:15px;color:var(--text-hi)}
.d-input{background:rgba(255,255,255,0.04);border:1px solid var(--border-default)}
.d-core{background:linear-gradient(135deg,#22C55E22,#06B6D422);border:2px solid #22C55E;box-shadow:0 0 30px #22C55E22}
.d-output{background:rgba(255,255,255,0.04);border:1px solid var(--border-default)}
.d-arrow{color:#22C55E;font-family:var(--font-mono);font-size:20px}
.footer{position:absolute;bottom:20px;left:56px;right:56px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.footer-pills{display:flex;gap:8px}
.license{font-family:var(--font-mono);font-size:12px;color:var(--text-low)}
</style></head><body>
<div class="background"></div><div class="grid-overlay"></div><div class="noise-overlay"></div>
<div class="content">
<div class="left">
<div class="app-name text-gradient">Juprobe</div>
<div class="one-liner">Jupiter API DX probe — stress test, measure, report</div>
<div class="feat-item">→ Endpoint Stress Test</div><div class="feat-item">→ Latency Charts</div><div class="feat-item">→ PDF Report</div>
</div>
<div class="right">
<div class="diagram">
<div class="d-row">
<div class="d-node d-input">Endpoint Stress Test</div>
<div class="d-arrow">→</div>
<div class="d-node d-core">Juprobe</div>
<div class="d-arrow">→</div>
<div class="d-node d-output">Latency Charts</div>
</div>
<div class="d-row">
<div class="d-node d-input" style="opacity:0.6">PDF Report</div>
<div class="d-arrow">↗</div>
<div class="d-node d-core" style="opacity:0.8">Engine</div>
<div class="d-arrow">↘</div>
<div class="d-node d-output" style="opacity:0.6">Result</div>
</div>
</div>
</div>
</div>
<div class="footer">
<div class="footer-pills"><span class="tech-pill">Jupiter API</span> <span class="tech-pill">Next.js</span> <span class="tech-pill">Recharts</span> <span class="tech-pill">PDF Gen</span></div>
<div class="license">Built for Colosseum Frontier · MIT</div>
</div>
</body></html>
