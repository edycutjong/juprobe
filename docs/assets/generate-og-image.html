<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_asset-utilities.css"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;position:relative}
.content{position:relative;z-index:1;display:flex;height:100%;padding:60px}
.left{width:55%;display:flex;flex-direction:column;justify-content:center;gap:20px}
.right{width:45%;display:flex;align-items:center;justify-content:center}
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:12px;color:var(--color-success);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:var(--radius-full);padding:4px 14px}
.metric{font-family:var(--font-display);font-size:96px;font-weight:800;line-height:1.1}
.name{font-family:var(--font-display);font-size:42px;font-weight:600;color:var(--text-hi)}
.tagline{font-size:20px;color:var(--text-mid);max-width:500px;line-height:1.5}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.card{width:380px;height:420px;transform:perspective(1200px) rotateY(-12deg) rotateX(4deg);padding:32px;display:flex;flex-direction:column;gap:20px}
.card-title{font-family:var(--font-display);font-size:18px;color:var(--text-hi)}
.card-row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:14px;color:var(--text-mid);padding:12px 0;border-bottom:1px solid var(--border-subtle)}
.card-val{color:var(--text-hi)}
.feat{font-family:var(--font-mono);font-size:14px;color:var(--text-mid);display:flex;align-items:center;gap:8px}
.feat::before{content:'→';color:#22C55E}
</style></head><body>
<div class="background"></div><div class="grid-overlay"></div><div class="noise-overlay"></div>
<div class="content">
<div class="left">
<div class="badge"><span class="status-dot-pulse"></span> LIVE ON DEVNET</div>
<div class="metric text-gradient">2000-Word DX Report</div>
<div class="name">Juprobe</div>
<div class="tagline">Jupiter API DX probe — stress test, measure, report</div>
<div class="pills"><span class="tech-pill">Jupiter API</span> <span class="tech-pill">Next.js</span> <span class="tech-pill">Recharts</span> <span class="tech-pill">PDF Gen</span></div>
</div>
<div class="right">
<div class="card glass-panel">
<div class="card-title">Juprobe Overview</div>
<div class="feat">Endpoint Stress Test</div><div class="feat">Latency Charts</div><div class="feat">PDF Report</div>
<div class="card-row"><span>Status</span><span class="card-val" style="color:var(--color-success)">● Active</span></div>
<div class="card-row"><span>Network</span><span class="card-val">Solana Devnet</span></div>
<div class="card-row"><span>Latency</span><span class="card-val" style="color:#22C55E">&lt;200ms</span></div>
<div class="card-row"><span>Track</span><span class="card-val">Frontier</span></div>
</div>
</div>
</div>
</body></html>
