<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_asset-utilities.css"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:800px;overflow:hidden;position:relative}
.content{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100%}
.diagram{display:flex;align-items:center;gap:40px}
.node{padding:20px 28px;border-radius:var(--radius-16);font-family:var(--font-mono);font-size:18px;color:var(--text-hi);text-align:center;min-width:160px}
.node-input{background:rgba(255,255,255,0.04);border:1px solid var(--border-default)}
.node-core{background:linear-gradient(135deg,#22C55E22,#06B6D422);border:2px solid #22C55E;box-shadow:0 0 40px #22C55E33}
.node-output{background:rgba(255,255,255,0.04);border:1px solid var(--border-default)}
.arrow{font-size:32px;color:#22C55E;font-family:var(--font-mono)}
.label{font-size:12px;color:var(--text-low);margin-top:8px}
.trail{position:absolute;width:200px;height:2px;background:linear-gradient(90deg,transparent,#22C55E66,transparent);top:50%;opacity:0.3}
</style></head><body>
<div class="background"></div><div class="grid-overlay"></div><div class="noise-overlay"></div>
