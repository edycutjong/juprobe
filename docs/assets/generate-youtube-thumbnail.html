<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_asset-utilities.css"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1280px;height:720px;overflow:hidden;position:relative}
.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:24px}
.hook{font-family:var(--font-display);font-size:220px;font-weight:800;line-height:1}
.sub{font-size:36px;color:var(--text-mid);max-width:800px}
.corner{position:absolute;top:40px;right:40px;z-index:2}
.corner img{width:160px;height:160px}
.kicker{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:2;font-family:var(--font-mono);font-size:16px;padding:8px 24px;border-radius:var(--radius-full);background:rgba(255,255,255,0.06);border:1px solid var(--border-subtle);color:var(--text-mid)}
.glow-circle{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,#22C55E33 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0}
</style></head><body>
<div class="background"></div><div class="grid-overlay"></div><div class="noise-overlay"></div>
<div class="glow-circle"></div>
<div class="content">
<div class="hook text-gradient">2000-Word DX Report</div>
<div class="sub">Juprobe — Jupiter API DX probe — stress test, measure, report</div>
</div>
<div class="kicker">Built for Colosseum Frontier</div>
</body></html>
