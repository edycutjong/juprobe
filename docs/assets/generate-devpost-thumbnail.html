<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="./_asset-utilities.css"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:800px;overflow:hidden;position:relative}
.background{opacity:1.2}
.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:32px}
.icon-wrap{width:300px;height:300px}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%}
.title{font-family:var(--font-display);font-size:108px;font-weight:800}
.corner-tag{position:absolute;bottom:30px;right:30px;font-family:var(--font-mono);font-size:14px;color:var(--text-low)}
</style></head><body>
<div class="background"></div><div class="grid-overlay"></div><div class="noise-overlay"></div>
<div class="content">
<div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--primary,#22C55E)"/><stop offset="100%" stop-color="var(--accent,#06B6D4)"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="512" height="512" rx="80" fill="#020617"/><g filter="url(#glow)"><circle cx="256" cy="256" r="90" stroke="url(#g)" stroke-width="14" fill="none"/><ellipse cx="256" cy="256" rx="140" ry="40" stroke="url(#g)" stroke-width="8" fill="none" opacity="0.5"/><circle cx="256" cy="256" r="20" fill="url(#g)"/></g></svg></div>
<div class="title text-gradient">Juprobe</div>
</div>
<div class="corner-tag">Frontier 2026</div>
</body></html>
